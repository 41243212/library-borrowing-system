services:
  app:
    build: .
    container_name: csie_team14_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: csieDBTeam14
      DB_USERNAME: csie_user
      DB_PASSWORD: csiePassword14
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csie-network

  db:
    image: mysql:8.0
    container_name: csie_team14_mysql
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: rootPassword14
      MYSQL_DATABASE: csieDBTeam14
      MYSQL_USER: csie_user
      MYSQL_PASSWORD: csiePassword14
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - csie-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: csie_team14_phpmyadmin
    restart: no
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootPassword14
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - csie-network

volumes:
  mysql_data:

networks:
  csie-network:
    driver: bridge
